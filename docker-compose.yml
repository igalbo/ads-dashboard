services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ads_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ads_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      API_PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ads_dashboard?schema=public
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres-data:
